    <style>
        /* Custom Scrollbar - Updated to Crimson */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        
        body { 
            margin: 0; 
            background-color: #0f172a; /* Deep Slate Base */
            color: white; 
            font-family: 'Inter', sans-serif; 
            cursor: none; 
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Custom Cursor - Updated to Crimson */
        #custom-cursor {
            width: 12px; height: 12px; 
            background-color: #ef4444;
            box-shadow: 0 0 15px #ef4444, 0 0 30px rgba(239, 68, 68, 0.4);
            border-radius: 50%; 
            position: fixed; 
            pointer-events: none;
            z-index: 9999; 
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out, background-color 0.3s;
        }
    </style>

<body>
    <div id="custom-cursor"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="root"></div>

    <script>
        // Custom Cursor Interaction
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.closest('.glass-card')) {
                cursor.style.transform = 'translate(-50%, -50%) scale(4)';
                cursor.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
            }
        });
        document.addEventListener('mouseout', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.backgroundColor = '#ef4444';
        });

        // Refined Particles Animation (Enterprise Starfield)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        function initParticles() {
            particles = [];
            for(let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    speedY: Math.random() * 0.3 + 0.1,
                    opacity: Math.random()
                });
            }
        }
        initParticles();

        function animate() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.fillStyle = `rgba(239, 68, 68, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.y -= p.speedY;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
